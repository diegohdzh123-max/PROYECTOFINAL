<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encuesta Ballesta Minecraft</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Times New Roman", Arial, serif;
}

body{
    background:#2b2b2b;
    padding:20px;
    color:#e0e0e0;
}

.formulario{
    width:1100px;
    margin:auto;
    padding:15px;
}

.titulo{
    text-align:center;
    font-size:45px;
    letter-spacing:3px;
    margin-bottom:20px;
    color:#f0f0f0;
}

.seccion{
    border:2px solid #8a8a8a;
    border-radius:25px;
    margin-top:20px;
    padding:20px;
    background:transparent;
}

.seccion h2{
    font-size:22px;
    margin-bottom:20px;
    color:#ffffff;
}

.fila{
    display:flex;
    gap:15px;
    margin-bottom:18px;
}

.campo{
    flex:1;
    display:flex;
    flex-direction:column;
}

.campo label{
    margin-bottom:6px;
    font-size:15px;
    color:#d5d5d5;
}

.campo input,
.campo select,
.campo textarea{
    background:transparent;
    border:none;
    border-bottom:2px solid #9a9a9a;
    padding:8px;
    color:white;
    outline:none;
    font-size:15px;
}

.campo textarea{
    resize:none;
    height:90px;
    border:2px solid #9a9a9a;
    border-radius:15px;
}

.info{
    line-height:1.8;
    font-size:16px;
    color:#d0d0d0;
}

button{
    margin-top:10px;
    padding:12px 30px;
    border:2px solid #a0a0a0;
    background:transparent;
    color:white;
    cursor:pointer;
    border-radius:20px;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#444;
}

</style>
</head>

<body>

<div class="formulario">

    <div class="titulo">
        ENCUESTA SOBRE LA BALLESTA
    </div>

    <div class="seccion">

        <h2>Informaci&oacute;n General</h2>

        <div class="info">
            Esta encuesta fue creada para conocer la opini&oacute;n de los jugadores
            sobre la ballesta en Minecraft, su utilidad, ventajas y si es mejor
            que el arco tradicional.
        </div>

    </div>

    <div class="seccion">

        <h2>Datos del Jugador</h2>

        <div class="fila">

            <div class="campo">
                <label>Nombre de jugador</label>
                <input type="text">
            </div>

            <div class="campo">
                <label>Edad</label>
                <input type="number">
            </div>

        </div>

        <div class="fila">

            <div class="campo">
                <label>Versi&oacute;n de Minecraft</label>
                <select>
                    <option>Java Edition</option>
                    <option>Bedrock Edition</option>
                    <option>Ambas</option>
                </select>
            </div>

            <div class="campo">
                <label>Tiempo jugando Minecraft</label>
                <input type="text">
            </div>

        </div>

    </div>

    <div class="seccion">

        <h2>Encuesta</h2>

        <div class="fila">

            <div class="campo">
                <label>&iquest;Usas la ballesta frecuentemente?</label>
                <select>
                    <option>Si</option>
                    <option>No</option>
                    <option selected>A veces</option>
                </select>
            </div>

            <div class="campo">
                <label>Prefieres arco o ballesta?</label>
                <select>
                    <option>Arco</option>
                    <option>Ballesta</option>
                </select>
            </div>

        </div>

        <div class="fila">

            <div class="campo">
                <label>Encantamiento favorito</label>
                <input type="text">
            </div>

            <div class="campo">
                <label>La ballesta necesita mejoras?</label>
                <select>
                    <option>Si</option>
                    <option>No</option>
                    <option>Tal vez</option>
                </select>
            </div>

        </div>

        <div class="fila">

            <div class="campo">
                <label>Opini&oacute;n sobre la ballesta</label>
                <textarea></textarea>
            </div>

        </div>

        <button type="submit">
            ENVIAR ENCUESTA
        </button>

    </div>

</div>

</body>
</html>
