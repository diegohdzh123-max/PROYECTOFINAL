<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encuesta Escudo Minecraft</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Times New Roman", Arial, serif;
}

body{
    background:#2b2b2b;
    padding:20px;
    color:#e0e0e0;
}

.formulario{
    width:1100px;
    margin:auto;
    padding:15px;
}

.titulo{
    text-align:center;
    font-size:45px;
    letter-spacing:3px;
    margin-bottom:20px;
    color:#f0f0f0;
}

.seccion{
    border:2px solid #8a8a8a;
    border-radius:25px;
    margin-top:20px;
    padding:20px;
    background:transparent;
}

.seccion h2{
    font-size:22px;
    margin-bottom:20px;
    color:#ffffff;
}

.fila{
    display:flex;
    gap:15px;
    margin-bottom:18px;
}

.campo{
    flex:1;
    display:flex;
    flex-direction:column;
}

.campo label{
    margin-bottom:6px;
    font-size:15px;
    color:#d5d5d5;
}

.campo input,
.campo select,
.campo textarea{
    background:transparent;
    border:none;
    border-bottom:2px solid #9a9a9a;
    padding:8px;
    color:white;
    outline:none;
    font-size:15px;
}

.campo textarea{
    resize:none;
    height:90px;
    border:2px solid #9a9a9a;
    border-radius:15px;
}

.info{
    line-height:1.8;
    font-size:16px;
    color:#d0d0d0;
}

button{
    margin-top:10px;
    padding:12px 30px;
    border:2px solid #a0a0a0;
    background:transparent;
    color:white;
    cursor:pointer;
    border-radius:20px;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#444;
}

#Layer1 {
	position:absolute;
	width:200px;
	height:115px;
	z-index:1;
	left: 27px;
	top: 19px;
}
.Estilo1 {
	color: #FFFFFF;
	font-style: italic;
	font-weight: bold;
}
.Estilo2 {color: #FFFFFF}
</style>
</head>

<body>

<div class="formulario">

    <div class="titulo">
        ENCUESTA SOBRE EL ESCUDO
    </div>

    <div class="seccion">

        <h2>Informaci&oacute;n General</h2>

        <div class="info">
            Esta encuesta fue creada para conocer la opini&oacute;n de los jugadores
            sobre el escudo en Minecraft, su utilidad en combate y qu&eacute; tan importante
            consideran este objeto para sobrevivir dentro del juego.
        </div>

    </div>

    <div class="seccion">

        <h2>Datos del Jugador</h2>

        <div class="fila">

            <div class="campo">
                <label>Nombre de jugador</label>
                <input type="text">
            </div>

            <div class="campo">
                <label>Edad</label>
                <input type="number">
            </div>

        </div>

        <div class="fila">

            <div class="campo">
                <label>Versi&oacute;n de Minecraft</label>
                <select>
                    <option>Java Edition</option>
                    <option>Bedrock Edition</option>
                    <option>Ambas</option>
                </select>
            </div>

            <div class="campo">
                <label>Tiempo jugando Minecraft</label>
                <input type="text">
            </div>

        </div>

    </div>

    <div class="seccion">

        <h2>Encuesta</h2>

        <div class="fila">

            <div class="campo">
                <label>Usas el escudo frecuentemente?</label>
                <select>
                    <option>Si</option>
                    <option>No</option>
                    <option>A veces</option>
                </select>
            </div>

            <div class="campo">
                <label>Qu&eacute; tan &uacute;til consideras el escudo?</label>
                <select>
                    <option>Muy util</option>
                    <option>util</option>
                    <option>Poco util</option>
                </select>
            </div>

        </div>

        <div class="fila">

            <div class="campo">
                <label>Contra qu&eacute; enemigo usas m&eacute;s el escudo?</label>
                <input type="text">
            </div>

            <div class="campo">
                <label>El escudo necesita mejoras?</label>
                <select>
                    <option>Si</option>
                    <option>No</option>
                    <option>Tal vez</option>
                </select>
            </div>

        </div>

        <div class="fila">

          <div class="campo">
                <label>Opini&oacute;n sobre el escudo</label>
                <textarea></textarea>
                <div class="Estilo1" id="Layer1"><a href="ESCULOL.html" class="Estilo2">ESCUDO</a></div>
            </div>

        </div>

        <button type="submit">
            ENVIAR ENCUESTA
        </button>

    </div>

</div>

</body>
</html>
